server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/example;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- CSP parts (modular) ---
    set $csp_default    "default-src 'self'";
    set $csp_script     "script-src 'self' https://scripts.example-cdn.com https://hello.com https://dummy.com https://nginx.com";
    set $csp_style      "style-src 'self' 'unsafe-inline' https://styles.example-cdn.com";
    set $csp_img        "img-src 'self' data: https://images.example-cdn.com";
    set $csp_font       "font-src 'self' https://fonts.example-cdn.com https://actual.com";
    set $csp_connect    "connect-src 'self' https://api.example.com";
    set $csp_frame      "frame-ancestors 'self'";
    set $csp_object     "object-src 'none'";
    set $csp_base       "base-uri 'self'";
    set $csp_form       "form-action 'self'";

    # --- Combine into one CSP string ---
    set $csp "$csp_default; $csp_script; $csp_style; $csp_img; \
              $csp_font; $csp_connect; $csp_frame; $csp_object; \
              $csp_base; $csp_form";

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # --- Final CSP header ---
    add_header Content-Security-Policy "$csp" always;
}