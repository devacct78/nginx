server {
    listen 80;
    server_name example.com www.example.com;

    root /var/www/example;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # --- CSP parts (all single-line) ---
    set $csp_default "default-src 'self' https://a.example.com https://b.example.com https://c.example.com https://d.example.com https://e.example.com https://f.example.com https://g.example.com https://h.example.com https://i.example.com https://j.example.com";

    set $csp_script "script-src 'self' https://scripts1.example-cdn.com https://scripts2.example-cdn.com https://scripts3.example-cdn.com https://scripts4.example-cdn.com https://scripts5.example-cdn.com https://scripts6.example-cdn.com https://scripts7.example-cdn.com https://scripts8.example-cdn.com https://scripts9.example-cdn.com https://scripts10.example-cdn.com https://dor.com https://handle.com";

    set $csp_style "style-src 'self' 'unsafe-inline' https://styles1.example-cdn.com https://styles2.example-cdn.com https://styles3.example-cdn.com https://styles4.example-cdn.com https://styles5.example-cdn.com https://styles6.example-cdn.com https://styles7.example-cdn.com https://styles8.example-cdn.com https://styles9.example-cdn.com https://styles10.example-cdn.com https://hent.com https://twri.com";

    set $csp_img "img-src 'self' data: https://img1.example-cdn.com https://img2.example-cdn.com https://img3.example-cdn.com https://img4.example-cdn.com https://img5.example-cdn.com https://img6.example-cdn.com https://img7.example-cdn.com https://img8.example-cdn.com https://img9.example-cdn.com https://img10.example-cdn.com https://img11.example-cdn.com https://img12.example-cdn.com";

    set $csp_font "font-src 'self' https://fonts1.example-cdn.com https://fonts2.example-cdn.com https://fonts3.example-cdn.com https://fonts4.example-cdn.com https://fonts5.example-cdn.com https://fonts6.example-cdn.com https://fonts7.example-cdn.com https://fonts8.example-cdn.com https://fonts9.example-cdn.com https://fonts10.example-cdn.com";

    set $csp_connect "connect-src 'self' https://api1.example.com https://api2.example.com https://api3.example.com https://api4.example.com https://api5.example.com https://api6.example.com https://api7.example.com https://api8.example.com https://api9.example.com https://api10.example.com https://service.com";

    set $csp_frame "frame-ancestors 'self' https://frame1.example.com https://frame2.example.com https://frame3.example.com https://frame4.example.com https://frame5.example.com https://balle.com";

    set $csp_object "object-src 'none' https://martin.com";

    set $csp_base "base-uri 'self' https://ready.com https://freak.com";

    set $csp_form "form-action 'self' https://form1.example.com https://form2.example.com https://form3.example.com https://form4.example.com https://form5.example.com https://maccy.com https://agada.com";

    # --- Combine ---
    set $csp "$csp_default; $csp_script; $csp_style; $csp_img; $csp_font; $csp_connect; $csp_frame; $csp_object; $csp_base; $csp_form";

    # --- Security headers ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # --- Final CSP header ---
    add_header Content-Security-Policy "$csp" always;
}
